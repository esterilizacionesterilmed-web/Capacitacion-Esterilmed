<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacitación Interactiva · Proceso de Esterilización · EsterilMed</title>
<style>
  :root{
    --navy:#1b3a63; --navy2:#27548a; --blue:#4472C4; --blueL:#D9E2F3;
    --green:#3a9d5d; --greenD:#2c7d49; --ink:#1c2733; --muted:#5b6b7b;
    --bg:#eef2f7; --card:#ffffff; --warn:#c0392b; --warnBg:#fdecea;
    --okBg:#e9f7ee; --line:#dde5ee; --shadow:0 18px 50px rgba(20,45,80,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:Arial, Helvetica, sans-serif; color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%,#f6f9fd 0%,var(--bg) 60%);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:18px;
  }
  /* ---------- STAGE ---------- */
  .stage{
    width:min(1060px,100%); aspect-ratio:16/9; background:var(--card);
    border-radius:20px; box-shadow:var(--shadow); position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  @media (max-width:720px){ .stage{ aspect-ratio:auto; min-height:88vh } }

  /* ---------- HEADER ---------- */
  .top{ display:flex; align-items:center; gap:12px; padding:16px 26px 0 26px; flex-shrink:0; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .logo{ display:flex; align-items:baseline; font-weight:800; letter-spacing:.3px; }
  .brand .logo .a{ color:var(--navy) } .brand .logo .b{ color:var(--green) }
  .brand .logo small{ font-size:11px }
  .crumb{ margin-left:auto; font-size:11px; color:var(--muted); text-align:right; line-height:1.35; }
  .crumb b{ color:var(--navy) }

  /* ---------- SLIDE BODY ---------- */
  .slides{ position:relative; flex:1; }
  .slide{
    position:absolute; inset:0; padding:14px 40px 22px 40px;
    display:flex; flex-direction:column; justify-content:center;
    opacity:0; transform:translateX(34px) scale(.99); pointer-events:none;
    transition:opacity .45s ease, transform .45s ease;
  }
  .slide.active{ opacity:1; transform:none; pointer-events:auto; }
  .slide.exit-left{ transform:translateX(-34px) scale(.99); }
  @media (max-width:720px){ .slide{ padding:14px 22px 18px; position:relative; opacity:1; transform:none; display:none } .slide.active{display:flex} }

  h1.kicker{ font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--blue); margin-bottom:6px; }
  h2{ font-size:clamp(20px,3.1vw,33px); color:var(--navy); line-height:1.12; margin-bottom:14px; }
  h2 .num{ color:var(--green) }
  p.lead{ font-size:clamp(13px,1.7vw,16px); color:var(--muted); line-height:1.5; max-width:60ch }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  @media (max-width:720px){ .grid2,.grid3{ grid-template-columns:1fr } }

  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .card h3{ font-size:15px; color:var(--navy); margin-bottom:6px; }
  .card p{ font-size:13px; color:var(--muted); line-height:1.45; }

  .pill{ display:inline-flex; align-items:center; gap:8px; background:var(--blueL); color:var(--navy);
    font-weight:700; font-size:12px; padding:7px 13px; border-radius:999px; }

  .note{ margin-top:14px; background:var(--blueL); border-radius:12px; padding:12px 16px;
    font-size:13px; color:var(--navy); display:flex; gap:10px; align-items:flex-start; line-height:1.45; }
  .note.warn{ background:var(--warnBg); color:var(--warn) }
  .note.ok{ background:var(--okBg); color:var(--greenD) }
  .note .ic{ font-size:18px; flex-shrink:0 }

  /* animated reveal items */
  .rv{ opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease; }
  .slide.active .rv.show{ opacity:1; transform:none; }

  /* ---------- COVER ---------- */
  .cover{ background:linear-gradient(135deg,var(--navy) 0%,#15406e 55%,var(--greenD) 130%); }
  .cover .slide{ color:#fff; align-items:flex-start }
  .cover h2{ color:#fff; font-size:clamp(26px,4.6vw,46px) }
  .cover .lead{ color:#cfe0f3 }
  .cover .presenters{ margin-top:18px; font-size:14px; color:#e8f1fb; line-height:1.7 }
  .cover .presenters b{ color:#fff }
  .startBtn{ margin-top:26px; background:var(--green); color:#fff; border:none; font-weight:800;
    font-size:16px; padding:14px 30px; border-radius:999px; cursor:pointer; box-shadow:0 10px 24px rgba(0,0,0,.25);
    transition:transform .15s ease, background .2s ease; }
  .startBtn:hover{ transform:translateY(-2px); background:#46b06c }

  /* ---------- CLICKABLE FLOW (9 etapas) ---------- */
  .flow{ display:grid; grid-template-columns:repeat(9,1fr); gap:8px; margin-top:6px; }
  @media (max-width:720px){ .flow{ grid-template-columns:repeat(3,1fr) } }
  .step{ position:relative; background:#fff; border:1.5px solid var(--line); border-radius:12px;
    padding:12px 6px; text-align:center; cursor:pointer; transition:all .2s ease; }
  .step:hover{ border-color:var(--blue); transform:translateY(-3px); box-shadow:0 8px 18px rgba(40,84,138,.16) }
  .step.on{ background:var(--navy); border-color:var(--navy); color:#fff }
  .step .n{ width:26px;height:26px;border-radius:50%;background:var(--blueL);color:var(--navy);
    font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px }
  .step.on .n{ background:var(--green); color:#fff }
  .step span{ font-size:10.5px; line-height:1.2; display:block; color:inherit }
  .flowDetail{ margin-top:14px; background:var(--blueL); border-radius:12px; padding:14px 18px; min-height:64px;
    font-size:14px; color:var(--navy); line-height:1.5; transition:.2s }
  .flowDetail b{ color:var(--greenD) }

  /* ---------- DAMAGE ANIM (etapa1) ---------- */
  .dmgWrap{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:center }
  @media(max-width:720px){ .dmgWrap{ grid-template-columns:1fr } }
  .scalpel{ position:relative; height:170px; display:flex; align-items:center; justify-content:center; }
  .scalpel svg{ width:100%; max-width:330px; height:auto }
  .rustdot{ opacity:0; transition:opacity .6s ease }
  .scalpel.show .rustdot{ opacity:.9 }
  .dmgList{ display:flex; flex-direction:column; gap:10px }
  .dmg{ background:#fff;border:1px solid var(--line);border-left:0;border-radius:12px;padding:12px 14px;
    display:flex;gap:12px;align-items:flex-start }
  .dmg .ic{ width:34px;height:34px;border-radius:9px;background:var(--warnBg);color:var(--warn);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0 }
  .dmg h3{ font-size:14px;color:var(--navy);margin-bottom:2px }
  .dmg p{ font-size:12px;color:var(--muted);line-height:1.4 }

  /* ---------- CHECKLIST build ---------- */
  .check{ display:flex; gap:11px; align-items:flex-start; padding:9px 4px; border-bottom:1px dashed var(--line) }
  .check:last-child{ border-bottom:none }
  .check .b{ width:24px;height:24px;border-radius:7px;background:var(--green);color:#fff;font-weight:800;
    font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0 }
  .check p{ font-size:13.5px; color:var(--ink); line-height:1.4 }
  .check p b{ color:var(--navy) }

  /* ---------- EMPAQUE interactive ---------- */
  .empRow{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px }
  .empBtn{ background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;cursor:pointer;
    font-size:12.5px;color:var(--navy);font-weight:700;transition:.18s; text-align:left; flex:1; min-width:120px }
  .empBtn:hover{ border-color:var(--blue) }
  .empBtn.on{ background:var(--navy);color:#fff;border-color:var(--navy) }
  .empOut{ background:var(--okBg); border-radius:12px; padding:18px; text-align:center }
  .empOut .big{ font-size:38px; font-weight:800; color:var(--greenD); line-height:1 }
  .empOut .lbl{ font-size:13px; color:var(--muted); margin-top:6px }

  /* ---------- INDICATOR CARDS ---------- */
  .cls{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px }
  @media(max-width:720px){ .cls{ grid-template-columns:repeat(2,1fr) } }
  .clsCard{ background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;
    transition:.18s; position:relative; overflow:hidden }
  .clsCard:hover{ border-color:var(--blue); transform:translateY(-2px) }
  .clsCard .tag{ font-size:12px;font-weight:800;color:var(--blue) }
  .clsCard h3{ font-size:14px;color:var(--navy);margin:4px 0 0 }
  .clsCard .desc{ font-size:11.5px;color:var(--muted);line-height:1.4;max-height:0;opacity:0;
    transition:.3s; margin-top:0 }
  .clsCard.on{ background:var(--navy); border-color:var(--navy) }
  .clsCard.on .tag{ color:#8fd3a8 } .clsCard.on h3{ color:#fff }
  .clsCard.on .desc{ max-height:120px;opacity:1;color:#cfe0f3;margin-top:8px }

  /* ---------- CONTAINERS flip ---------- */
  .contRow{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:6px }
  @media(max-width:720px){ .contRow{ grid-template-columns:1fr } }
  .cont{ border-radius:16px; padding:22px; color:#fff; cursor:pointer; min-height:160px;
    display:flex; flex-direction:column; justify-content:center; transition:transform .2s ease }
  .cont:hover{ transform:translateY(-4px) }
  .cont.red{ background:linear-gradient(135deg,#c0392b,#922b21) }
  .cont.blue{ background:linear-gradient(135deg,var(--blue),#2c5aa0) }
  .cont .ic{ font-size:30px; margin-bottom:8px }
  .cont h3{ font-size:20px; margin-bottom:6px }
  .cont p{ font-size:13px; opacity:.95; line-height:1.45 }
  .cont .hint{ font-size:11px; opacity:.8; margin-top:10px }

  /* ---------- TIMELINE ---------- */
  .tl{ display:flex; flex-direction:column; gap:8px }
  .tlPhase{ background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px }
  .tlPhase h3{ font-size:13px;color:var(--blue);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px }
  .tlBar{ display:flex; gap:6px; flex-wrap:wrap; align-items:center }
  .tlSeg{ background:var(--blueL); color:var(--navy); font-size:11.5px; font-weight:700;
    padding:6px 11px; border-radius:8px; white-space:nowrap }
  .tlSeg.tot{ background:var(--green); color:#fff }

  /* ---------- QUIZ ---------- */
  .quizSlide{ background:linear-gradient(135deg,#f3f7fc,#e7eef8) }
  .quizCard{ background:#fff; border-radius:18px; box-shadow:0 14px 40px rgba(30,60,110,.12);
    padding:26px 30px; max-width:680px; margin:0 auto; width:100% }
  .quizCard .qtag{ font-size:12px; font-weight:800; letter-spacing:1.5px; color:var(--green); text-transform:uppercase }
  .quizCard h2{ font-size:clamp(18px,2.6vw,25px); margin:8px 0 18px }
  .opt{ display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line);
    border-radius:12px; padding:13px 16px; margin-bottom:10px; font-size:14px; color:var(--ink);
    cursor:pointer; transition:.15s; font-family:inherit }
  .opt:hover{ border-color:var(--blue); background:#f7faff }
  .opt.correct{ border-color:var(--green); background:var(--okBg); color:var(--greenD); font-weight:700 }
  .opt.wrong{ border-color:var(--warn); background:var(--warnBg); color:var(--warn) }
  .opt:disabled{ cursor:default }
  .feedback{ margin-top:12px; font-size:13.5px; line-height:1.5; padding:12px 16px; border-radius:10px;
    display:none }
  .feedback.show{ display:block }
  .feedback.good{ background:var(--okBg); color:var(--greenD) }
  .feedback.bad{ background:var(--warnBg); color:var(--warn) }

  /* ---------- CLOSING ---------- */
  .closing{ background:linear-gradient(135deg,var(--navy),#15406e) }
  .closing .slide{ color:#fff; align-items:center; text-align:center }
  .closing h2{ color:#fff; font-size:clamp(22px,3.6vw,38px) }
  .closing .sub{ color:#bcd2ec; font-size:clamp(15px,2vw,20px); margin-top:10px; line-height:1.4 }
  .closing .ticks{ display:flex; gap:22px; margin-top:26px; flex-wrap:wrap; justify-content:center }
  .closing .tick{ font-size:15px; color:#dff0e7 } .closing .tick b{ color:#7fe0a3 }

  /* ---------- NAV ---------- */
  .nav{ display:flex; align-items:center; gap:12px; padding:12px 26px 16px; flex-shrink:0;
    border-top:1px solid var(--line); }
  .progress{ flex:1; height:7px; background:#e3eaf3; border-radius:99px; overflow:hidden }
  .progress .bar{ height:100%; background:linear-gradient(90deg,var(--blue),var(--green)); width:0%;
    border-radius:99px; transition:width .4s ease }
  .navBtn{ border:none; width:40px;height:40px;border-radius:50%; background:var(--navy); color:#fff;
    font-size:18px; cursor:pointer; display:flex;align-items:center;justify-content:center; transition:.15s }
  .navBtn:hover{ background:var(--navy2) }
  .navBtn:disabled{ background:#c3cdd9; cursor:default }
  .counter{ font-size:12px; color:var(--muted); min-width:54px; text-align:center; font-variant-numeric:tabular-nums }
  .hintKeys{ position:absolute; bottom:70px; left:50%; transform:translateX(-50%); font-size:11px;
    color:var(--muted); background:#fff; padding:5px 12px; border-radius:99px; box-shadow:0 4px 14px rgba(0,0,0,.08);
    opacity:.9; pointer-events:none }
  @media(max-width:720px){ .hintKeys{ display:none } }


  .brand .logoImg{ height:34px; width:auto; display:block; background:#fff; padding:3px 6px; border-radius:7px; }
  .credit{ font-size:11px; color:var(--muted); }
  .cover .credit-cover{ margin-top:14px; font-size:12.5px; color:#9fc0e6; letter-spacing:.3px; }
  .cover .credit-cover b{ color:#dcebff; }
  .closing .credit-close{ margin-top:24px; font-size:12.5px; color:#9bb6d6; }
  .closing .credit-close b{ color:#cfe0f3 }
  .counter-big{ font-size:clamp(40px,8vw,84px); font-weight:800; color:var(--green); line-height:1 }
</style>
</head>

/* ============================================================
   MOTOR DE LA PRESENTACIÓN
   ============================================================ */
const slidesEl = document.getElementById('slides');
const stage = document.getElementById('stage');
let cur = 0;

// build slide DOM
S.forEach((s,i)=>{
  const d = document.createElement('div');
  d.className = 'slide' + (s.bgClass?(' '+s.bgClass):'');
  if(s.quiz){ d.innerHTML = quizHTML(s.quiz, i); }
  else { d.innerHTML = s.html; }
  d.dataset.idx = i;
  slidesEl.appendChild(d);
  s._el = d;
});

// background helpers for whole-stage themed slides (cover/closing/quiz)
function applyStageBg(i){
  stage.classList.remove('cover','closing','quizSlide');
  const cls = S[i].bgClass;
  if(cls){ stage.classList.add(cls); }
}

function quizHTML(q, idx){
  return `<div class="quizCard">
    <div class="qtag">Comprobemos lo aprendido</div>
    <h2>${q.q}</h2>
    <div id="opts-${idx}">${q.opts.map((o,j)=>`<button class="opt" onclick="answer(${idx},${j})">${o}</button>`).join('')}</div>
    <div class="feedback" id="fb-${idx}"></div>
  </div>`;
}

window.answer = function(idx,j){
  const q = S[idx].quiz;
  if(S[idx]._answered) return;
  S[idx]._answered = true;
  const opts = document.querySelectorAll(`#opts-${idx} .opt`);
  opts.forEach((b,k)=>{ b.disabled=true; if(k===q.correct) b.classList.add('correct'); });
  const fb = document.getElementById(`fb-${idx}`);
  if(j===q.correct){ fb.className='feedback show good'; fb.textContent='✔ '+q.good; }
  else { opts[j].classList.add('wrong'); fb.className='feedback show bad'; fb.textContent='✕ '+q.bad; }
};

function render(prev){
  S.forEach((s,i)=>{
    s._el.classList.remove('active','exit-left');
    if(i===cur){ s._el.classList.add('active'); }
    else if(i<cur){ s._el.classList.add('exit-left'); }
  });
  applyStageBg(cur);
  document.getElementById('crumbTitle').textContent = S[cur].crumb || 'Capacitación';
  document.getElementById('counter').textContent = (cur+1)+' / '+S.length;
  document.getElementById('bar').style.width = ((cur)/(S.length-1)*100)+'%';
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===S.length-1;
  // reveal animation
  if(S[cur].reveal){ revealSeq(S[cur]._el); }
  if(S[cur].onShow){ S[cur].onShow(); }
}

function revealSeq(el){
  const items = el.querySelectorAll('.rv');
  items.forEach((it,k)=>{ it.classList.remove('show'); setTimeout(()=>it.classList.add('show'), 120 + k*140); });
}

window.go = function(i){ const prev=cur; cur=Math.max(0,Math.min(S.length-1,i)); render(prev); };
function next(){ if(cur<S.length-1) go(cur+1); }
function prev(){ if(cur>0) go(cur-1); }

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }
  if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  if(e.key==='Home'){ go(0); } if(e.key==='End'){ go(S.length-1); }
});
// swipe
let tx=0;
slidesEl.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
slidesEl.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ dx<0?next():prev(); } },{passive:true});

function buildFlow(){

    const s=document.createElement('div'); s.className='step';
    s.innerHTML=`<div class="n">${i+1}</div><span>${e[0].split(' ').slice(0,2).join(' ')}</span>`;
    s.onclick=()=>{ document.querySelectorAll('#flow .step').forEach(x=>x.classList.remove('on'));
      s.classList.add('on'); document.getElementById('flowDetail').innerHTML=`<b>${i+1}. ${e[0]}</b> — ${e[1]}`; };
    f.appendChild(s);
  });
}

const EMP = [
  ["Papel polipropileno simple","1 mes"],
  ["Papel polipropileno doble","3 meses"],
  ["Un papel polipropileno + Pouche","3 meses"],
  ["Envoltorio Pouche (bilaminado) simple","6 meses"],
  ["Envoltorio Pouche (bilaminado) doble","12 meses"]
];
function buildEmpaque(){
  const row=document.getElementById('empRow'); if(!row || row.dataset.built) return; row.dataset.built=1;
  EMP.forEach((e,i)=>{
    const b=document.createElement('button'); b.className='empBtn'; b.textContent=e[0];
    b.onclick=()=>{ document.querySelectorAll('#empRow .empBtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      const out=document.getElementById('empOut');
      out.innerHTML=`<div class="big">${e[1]}</div><div class="lbl">${e[0]}</div>`; };
    row.appendChild(b);
  });
}

const CLASES=[
  ["Clase 1","Indicador de proceso","Solo demuestra exposición al procedimiento."],
  ["Clase 2","Test Bowie-Dick","Verifica la eficiencia del sistema de remoción de aire."],
  ["Clase 3","Un solo parámetro","Responde a una variable crítica del proceso."],
  ["Clase 4","Multiparámetros","Responde a dos o más variables (tiempo + temperatura)."],
  ["Clase 5","Integrador","Responde a TODAS las variables: tiempo, presión, humedad y temperatura."],
  ["Clase 6","Emulador","Reacciona a todas las variables de un ciclo específico (ej: priones 134°C/18min)."]
];
function buildClases(){
  const g=document.getElementById('clsGrid'); if(!g || g.dataset.built) return; g.dataset.built=1;
  CLASES.forEach(c=>{
    const card=document.createElement('div'); card.className='clsCard';
    card.innerHTML=`<div class="tag">${c[0]}</div><h3>${c[1]}</h3><div class="desc">${c[2]}</div>`;
    card.onclick=()=>card.classList.toggle('on');
    g.appendChild(card);
  });
}

function buildContainers(){
  const r=document.getElementById('contRed'), b=document.getElementById('contBlue');
  if(!r||r.dataset.built) return; r.dataset.built=1;
  const toggle=(el,other)=>{ el.style.transform='scale(1.04)'; el.style.boxShadow='0 16px 40px rgba(0,0,0,.3)';
    other.style.transform='scale(.97)'; other.style.opacity='.7'; setTimeout(()=>{ other.style.opacity='1'; },1200); };
  r.onclick=()=>toggle(r,b); b.onclick=()=>toggle(b,r);
}

/* init */
render(0);
</script>
